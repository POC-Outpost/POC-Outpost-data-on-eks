apiVersion: apps/v1
kind: Deployment
metadata:
  name: spark-operator-controller
  namespace: spark-operator
spec:
  template:
    spec:
      volumes:
      - name: spark-jars
        emptyDir: {}
      initContainers:
      - name: init-copy-jars
        image: ghcr.io/kubeflow/spark-operator/controller:2.2.0
        command:
          - sh
          - -c
          - |
            cp -r /opt/spark/jars/. /spark-jars/
            wget -P /spark-jars https://repo1.maven.org/maven2/org/apache/hadoop/hadoop-aws/3.4.1/hadoop-aws-3.4.1.jar
            wget -P /spark-jars https://repo1.maven.org/maven2/com/amazonaws/aws-java-sdk-bundle/1.12.788/aws-java-sdk-bundle-1.12.788.jar
        volumeMounts:
        - name: spark-jars
          mountPath: /spark-jars
      containers:
      - name: spark-operator-controller
        volumeMounts:
        - name: spark-jars
          mountPath: /opt/spark/jars
